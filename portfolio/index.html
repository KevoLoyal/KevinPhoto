<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Portfolio • KevinPhoto</title>
    <style>
      :root{
        --bg:#070708;
        --panel:#0c0d0f;
        --text:#f5f5f5;
        --muted:#a7a7a7;
        --line:rgba(255,255,255,.10);
        --accent:#ffcc00;
      }
      *{box-sizing:border-box}
      html,body{height:100%}
      body{
        margin:0;
        background:radial-gradient(1000px 600px at 20% -10%, rgba(255,204,0,.10), transparent 60%),
                   radial-gradient(900px 600px at 80% 0%, rgba(255,255,255,.06), transparent 55%),
                   var(--bg);
        color:var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        line-height:1.4;
      }
      a{color:inherit; text-decoration:none}
      .wrap{max-width:1120px; margin:0 auto; padding:0 20px}

      header{
        position:sticky; top:0; z-index:10;
        background:rgba(7,7,8,.72);
        backdrop-filter: blur(10px);
        border-bottom:1px solid var(--line);
      }
      .nav{
        display:flex; align-items:center; justify-content:space-between;
        height:64px;
      }
      .brand{
        display:flex; align-items:center; gap:12px;
        letter-spacing:.18em; text-transform:uppercase; font-weight:700;
        font-size:13px;
      }
      .brand-mark{
        width:14px; height:22px;
        border:2px solid var(--accent);
        box-shadow: 0 0 0 1px rgba(0,0,0,.25) inset;
      }
      nav ul{list-style:none; display:flex; gap:18px; padding:0; margin:0}
      nav a{
        font-size:13px;
        color:var(--muted);
        letter-spacing:.08em;
        text-transform:uppercase;
        padding:10px 8px;
        border-radius:10px;
      }
      nav a:hover{color:var(--text); background:rgba(255,255,255,.06)}

      .hero{padding:64px 0 22px}
      .kicker{
        display:inline-flex; align-items:center; gap:10px;
        color:var(--muted);
        font-size:12px;
        letter-spacing:.16em;
        text-transform:uppercase;
      }
      .kicker::before{
        content:"";
        width:10px; height:10px;
        border:2px solid var(--accent);
        display:inline-block;
      }
      h1{
        margin:14px 0 10px;
        font-size: clamp(2.2rem, 5.6vw, 4rem);
        line-height:1.05;
        letter-spacing:-0.02em;
      }
      .sub{
        margin:0;
        max-width:70ch;
        color:var(--muted);
        font-size: clamp(1rem, 1.4vw, 1.1rem);
      }

      main{padding:18px 0 64px}
      .section-title{
        margin:18px 0 14px;
        display:flex; align-items:center; justify-content:space-between;
        gap:12px;
      }
      .section-title h2{
        margin:0;
        font-size:14px;
        letter-spacing:.14em;
        text-transform:uppercase;
        color:var(--muted);
        font-weight:700;
      }
      .section-title .rule{
        flex:1;
        height:1px;
        background:var(--line);
      }

      figure{
        margin:0;
        border:1px solid var(--line);
        border-radius:16px;
        overflow:hidden;
        background:var(--panel);
        position:relative;
        min-height:260px;
      }
      figure a{display:block; height:100%}
      img{
        width:100%;
        height:100%;
        object-fit:cover;
        display:block;
        transform:scale(1.01);
        transition: transform .45s ease, filter .45s ease;
        filter:saturate(1.03) contrast(1.02);
      }
      figure:hover img{
        transform:scale(1.06);
        filter:saturate(1.08) contrast(1.05);
      }
      figcaption{
        position:absolute;
        left:0; right:0; bottom:0;
        padding:14px 14px 12px;
        background: linear-gradient(to top, rgba(0,0,0,.78), rgba(0,0,0,0));
        color:rgba(255,255,255,.92);
        font-size:12px;
        letter-spacing:.06em;
        text-transform:uppercase;
      }

      @media (max-width: 900px){
        .hero{padding:44px 0 18px}
      }
    </style>
  </head>

  <body>
    <header>
      <div class="wrap nav">
        <a class="brand" href="../" aria-label="Homepage">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>KevinPhoto</span>
        </a>
        <nav aria-label="Primary">
          <ul>
            <li><a href="../">Main</a></li>
            <li><a href="./">Portfolio</a></li>
            <li><a href="../contact/">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <div class="wrap">
      <section class="hero">
        <div class="kicker">Kevin Photo Club</div>
        <h1>Portfolio</h1>
        <p class="sub">This page will be powered by Azure (Blob + Cosmos DB + SAS). For now, one featured image.</p>
      </section>

      <main>
        <div class="section-title">
          <h2>Featured</h2><div class="rule" aria-hidden="true"></div>
        </div>

        <figure>
          <a href="https://images.unsplash.com/photo-1776191863050-4ac5dd94bd7f?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" target="_blank" rel="noreferrer">
            <img
              src="https://images.unsplash.com/photo-1776191863050-4ac5dd94bd7f?q=80&w=1600&auto=format&fit=crop&ixlib=rb-4.1.0"
              alt="Featured photograph from Kevin Leal’s Unsplash portfolio"
              loading="lazy"
            />
            <figcaption>Featured Story</figcaption>
          </a>
        </figure>
      </main>
    </div>
  </body>
</html>
